name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
      - master

jobs:
  build-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Node app version
        id: node_version
        run: echo "version=$(cat apps/node-app/VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Node.js image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/node-app
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/node-app:v${{ steps.node_version.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/node-app:${{ github.sha }}

  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Python app version
        id: python_version
        run: echo "version=$(cat apps/python-app/VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Python image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/python-app
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/python-app:v${{ steps.python_version.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ github.sha }}
